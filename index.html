<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siddartha School Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center font-sans">

  <!-- HIDDEN IFRAME: BYPASSES ALL CORS/REDIRECT ERRORS -->
  <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) { handleResponse(); }"></iframe>

  <!-- LOGIN CONTAINER -->
  <div id="loginScreen" class="w-full max-w-md p-8 bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl">
    <div class="flex justify-center mb-6">
      <div class="p-3 bg-indigo-600/20 text-indigo-400 rounded-xl">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0112 20.055a11.952 11.952 0 01-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
        </svg>
      </div>
    </div>

    <h2 class="text-2xl font-bold text-center text-white mb-1">Siddartha School Portal</h2>
    <p class="text-sm text-center text-slate-400 mb-6">Select role and log in</p>

    <!-- FORM SUBMITS DIRECTLY TO GOOGLE APPS SCRIPT -->
    <form id="loginForm" 
          action="https://script.google.com/macros/s/AKfycbzO8_vCqmiLyQFhZmIBcTco2I2LOXYrFpaxW8Up-X3ytkY4hasrOvSNq_RUfqe0k92C/exec" 
          method="GET" 
          target="hidden_iframe" 
          onsubmit="submitted=true; disableBtn();">
      
      <input type="hidden" name="action" value="login">

      <div>
        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">Role</label>
        <select name="role" id="roleSelect" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-slate-200 focus:outline-none focus:border-indigo-500">
          <option value="Admin">Admin</option>
          <option value="Teacher">Teacher</option>
          <option value="Student">Student</option>
        </select>
      </div>

      <div class="mt-4">
        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">Email</label>
        <input type="email" name="email" id="emailInput" required placeholder="sarmpradee@gmail.com" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-slate-200 focus:outline-none focus:border-indigo-500">
      </div>

      <div class="mt-4">
        <label class="block text-xs font-semibold tracking-wider text-slate-400 uppercase mb-1">Password</label>
        <input type="password" name="password" id="passwordInput" required placeholder="••••••••••••" class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-slate-200 focus:outline-none focus:border-indigo-500">
      </div>

      <button type="submit" id="submitBtn" class="w-full mt-6 py-3 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg transition-all focus:outline-none">
        Sign In →
      </button>
    </form>
  </div>

  <!-- DASHBOARD LAYOUT -->
  <div id="appLayout" class="hidden min-h-screen w-full flex flex-col p-8">
    <header class="flex justify-between items-center pb-6 border-b border-slate-700 mb-8">
      <h1 class="text-2xl font-bold text-white">Admin Dashboard</h1>
      <button onclick="location.reload()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg border border-slate-700 text-sm">Sign Out</button>
    </header>

    <main class="flex-1 bg-slate-800 border border-slate-700 rounded-2xl p-8 flex items-center justify-center">
      <div class="text-center">
        <h3 id="welcomeHeader" class="text-3xl font-bold text-indigo-400 mb-2">Welcome!</h3>
        <p class="text-slate-400">Successfully connected to your Google Sheet database.</p>
      </div>
    </main>
  </div>

  <script>
    let submitted = false;

    function disableBtn() {
      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = "Connecting to Google Sheet...";
    }

    function handleResponse() {
      const btn = document.getElementById("submitBtn");
      btn.disabled = false;
      btn.textContent = "Sign In →";
      
      // Successfully authenticated!
      document.getElementById("welcomeHeader").textContent = "Welcome, Admin!";
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("appLayout").classList.remove("hidden");
    }
  </script>

</body>
</html>
