<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwwcPAqFA6OSFEfnRvDuv_rLYEDeuAORWcWERQVX1TwZIA2pd_BjPwQf3PnK9D4U10ATQ/exec";

    const ROLE_CONFIGS = {
      Admin: { title: 'Admin Console', nav: [{ label: 'Overview', icon: 'layout-dashboard', active: true }] },
      Teacher: { title: 'Teacher Portal', nav: [{ label: 'Attendance & Marks', icon: 'check-square', active: true }] },
      Student: { title: 'Student Portal', nav: [{ label: 'My Report Card', icon: 'award', active: true }] },
      Parent: { title: 'Parent Portal', nav: [{ label: 'Child Progress', icon: 'heart', active: true }] },
      Accountant: { title: 'Accounts Portal', nav: [{ label: 'Fee Management', icon: 'dollar-sign', active: true }] }
    };

    let currentUser = null;

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = e.target.querySelector('button');
      submitBtn.disabled = true;
      submitBtn.innerText = "Connecting to Google Sheet...";

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const role = document.getElementById('roleSelect').value;

      // Construct request URL with parameters to bypass CORS restrictions
      const requestUrl = `${API_URL}?action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&role=${encodeURIComponent(role)}`;

      try {
        const response = await fetch(requestUrl);
        const result = await response.json();

        if (result.success) {
          currentUser = result.userContext || { name: email.split('@')[0], role: role };
          renderDashboard();
          document.getElementById('loginSection').classList.add('hidden');
          document.getElementById('dashboardSection').classList.remove('hidden');
        } else {
          alert("Login Failed: " + (result.message || "Invalid Email or Password"));
        }
      } catch (err) {
        alert("API Error: Unable to fetch data from Google Apps Script. Check script permissions or doGet function.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "Sign In";
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      document.getElementById('dashboardSection').classList.add('hidden');
      document.getElementById('loginSection').classList.remove('hidden');
    });

    function renderDashboard() {
      const config = ROLE_CONFIGS[currentUser.role] || ROLE_CONFIGS.Admin;
      document.getElementById('userNameDisplay').textContent = currentUser.name || "User";
      document.getElementById('userRoleBadge').textContent = currentUser.role;
      document.getElementById('userAvatar').textContent = (currentUser.name || "US").substring(0, 2).toUpperCase();
      document.getElementById('pageTitle').textContent = config.title;

      document.getElementById('sidebarNav').innerHTML = config.nav.map(item => `
        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-indigo-600 text-white">
          <i data-lucide="${item.icon}" class="w-4 h-4"></i>
          <span>${item.label}</span>
        </a>
      `).join('');
      lucide.createIcons();
    }
    lucide.createIcons();
  </script>
